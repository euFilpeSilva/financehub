services:
  oracle-db:
    image: gvenzl/oracle-free:23-slim
    container_name: financehub-oracle
    environment:
      ORACLE_PASSWORD: ${ORACLE_PASSWORD:?ORACLE_PASSWORD is required}
      APP_USER: ${APP_USER:-financehub}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:?APP_USER_PASSWORD is required}
    ports:
      - "1521:1521"
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s

  backend-financeiro:
    build:
      context: ./backend-financeiro
      dockerfile: Dockerfile
    container_name: financehub-backend
    depends_on:
      oracle-db:
        condition: service_healthy
    environment:
      DB_URL: jdbc:oracle:thin:@//oracle-db:1521/FREEPDB1
      DB_USERNAME: ${APP_USER:-financehub}
      DB_PASSWORD: ${APP_USER_PASSWORD:?APP_USER_PASSWORD is required}
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend-financeiro:
    build:
      context: ./gestao-financeira
      dockerfile: Dockerfile
    container_name: financehub-frontend
    depends_on:
      backend-financeiro:
        condition: service_started
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  oracle_data:
