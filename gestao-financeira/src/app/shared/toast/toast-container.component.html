<div class="pointer-events-none fixed right-4 top-4 z-50 flex w-[min(92vw,420px)] flex-col gap-2">
  <article
    *ngFor="let message of toast.messages()"
    class="pointer-events-auto rounded-2xl border px-4 py-3 shadow-card"
    [ngClass]="message.type === 'success'
      ? 'border-emerald-200 bg-emerald-50 text-emerald-800'
      : message.type === 'error'
        ? 'border-rose-200 bg-rose-50 text-rose-800'
        : 'border-sky-200 bg-sky-50 text-sky-800'"
  >
    <div class="flex items-start gap-2">
      <lucide-angular [img]="message.type === 'success' ? CheckCircle2 : message.type === 'error' ? TriangleAlert : CircleHelp" [size]="18"></lucide-angular>
      <p class="flex-1 text-sm font-semibold">{{ message.text }}</p>
      <button type="button" (click)="toast.dismiss(message.id)" class="rounded-md p-1 opacity-70 transition hover:opacity-100" aria-label="Fechar toast">
        <lucide-angular [img]="X" [size]="14"></lucide-angular>
      </button>
    </div>
  </article>
</div>
