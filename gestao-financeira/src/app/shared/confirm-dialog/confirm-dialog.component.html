<div *ngIf="dialog.state().open" class="fixed inset-0 z-50">
  <div class="absolute inset-0 bg-slate-900/55"></div>
  <div class="absolute inset-0 flex items-center justify-center p-4">
    <article class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-5 shadow-card">
      <div class="mb-3 flex items-start gap-3">
        <span
          class="inline-flex h-9 w-9 items-center justify-center rounded-xl"
          [ngClass]="dialog.state().tone === 'danger' ? 'bg-rose-100 text-rose-700' : 'bg-slate-100 text-slate-700'"
        >
          <lucide-angular [img]="AlertTriangle" [size]="18"></lucide-angular>
        </span>
        <div>
          <h3 class="text-base font-bold text-slate-900">{{ dialog.state().title }}</h3>
          <p class="mt-1 text-sm text-slate-600">{{ dialog.state().message }}</p>
        </div>
      </div>

      <div *ngIf="dialog.state().requiredText" class="mt-4 space-y-2">
        <label class="block text-xs font-semibold uppercase tracking-wide text-slate-500">
          {{ dialog.state().requiredTextLabel || ('Digite ' + dialog.state().requiredText + ' para confirmar') }}
        </label>
        <input
          type="text"
          [ngModel]="dialog.state().typedText"
          (ngModelChange)="dialog.updateTypedText($event)"
          class="w-full rounded-xl border border-slate-200 px-3 py-2 text-sm"
          [attr.placeholder]="dialog.state().requiredText"
        />
      </div>

      <label
        *ngIf="dialog.state().checkboxLabel"
        class="mt-4 flex cursor-pointer items-start gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2"
      >
        <input
          type="checkbox"
          [ngModel]="dialog.state().checkboxChecked"
          (ngModelChange)="dialog.updateCheckbox($event)"
          class="mt-0.5 h-4 w-4 rounded border-slate-300 text-brand-600 focus:ring-brand-500"
        />
        <span class="text-sm text-slate-700">{{ dialog.state().checkboxLabel }}</span>
      </label>

      <div class="mt-5 flex justify-end gap-2">
        <button
          type="button"
          (click)="dialog.resolve(false)"
          class="rounded-xl border border-slate-200 bg-white px-3 py-2 text-sm font-semibold text-slate-700"
        >
          {{ dialog.state().cancelLabel }}
        </button>
        <button
          type="button"
          (click)="dialog.resolve(true)"
          class="rounded-xl px-3 py-2 text-sm font-bold text-white"
          [ngClass]="dialog.state().tone === 'danger' ? 'bg-rose-600 hover:bg-rose-500' : 'bg-slate-900 hover:bg-slate-700'"
          [disabled]="!dialog.canConfirm()"
          [class.opacity-60]="!dialog.canConfirm()"
          [class.cursor-not-allowed]="!dialog.canConfirm()"
        >
          {{ dialog.state().confirmLabel }}
        </button>
      </div>
    </article>
  </div>
</div>
